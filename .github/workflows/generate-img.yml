name: Generate Image
on:
  push:
    paths:
      - 'main.py'
      - 'devbox.*'
      - 'trends.csv'
      - 'pyproject.toml'
      - 'uv.lock'
    branches:
      - main
    tags:
      - "**"
jobs:
  changelog:
    name: Generate trend radar image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install devbox
        uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 # v0.14.0
        with:
          enable-cache: 'true'
          refresh-cli: 'false'
          devbox-version: 0.16.0
          disable-nix-access-token: 'false'
      - name: Generate image
        run: devbox run generate
      - name: Commit
        run: |
          git checkout main
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          set +e
          git add .
          git commit -m "chore(github-actions): update image"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git main
